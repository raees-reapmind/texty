name: Flutter Build
on:
  push:
    branches:
      - master
      - texty_dev
  pull_request:
    branches:
      - master
      - texty_dev

jobs:
  android-build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons --verbose

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  ios-build:
    name: Build iOS IPA (Unsigned)
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install CocoaPods 1.14.3
        run: |
          sudo gem uninstall cocoapods --all --ignore-dependencies || true
          sudo gem install cocoapods -v 1.14.3
          pod --version

      # CRITICAL: pub get MUST run before pod install
      # It generates ios/Flutter/podhelper.rb and Generated.xcconfig
      - name: Get dependencies
        run: flutter pub get

      # Verify generated files exist before pod install
      - name: Verify Flutter iOS files
        run: |
          echo "Checking for podhelper.rb..."
          ls ios/Flutter/podhelper.rb
          echo "Checking for Generated.xcconfig..."
          ls ios/Flutter/Generated.xcconfig
          echo "FLUTTER_ROOT in Generated.xcconfig:"
          grep FLUTTER_ROOT ios/Flutter/Generated.xcconfig

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --clean-install
        env:
          COCOAPODS_DISABLE_STATS: '1'

      - name: Build IPA
        run: flutter build ipa --no-codesign --release --verbose

      - name: Upload iOS Archive
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-archive
          path: build/ios/archive/Runner.xcarchive
```

---

## The exact sequence that must happen
```
flutter pub get
    └── generates → ios/Flutter/podhelper.rb       ← Podfile requires this
    └── generates → ios/Flutter/Generated.xcconfig  ← contains FLUTTER_ROOT path
          └── pod install reads FLUTTER_ROOT
                └── flutter build ipa