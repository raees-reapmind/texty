name: Flutter Build

on:
  push:
    branches:
      - master
      - texty_dev
  pull_request:
    branches:
      - master
      - texty_dev

jobs:
  android-build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Flutter Doctor
        run: flutter doctor -v

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons --verbose

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  ios-build:
    name: Build iOS IPA (Unsigned)
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Flutter Doctor
        run: flutter doctor -v

      - name: Get dependencies
        run: flutter pub get

      # ADD THIS: Generate Flutter iOS build files before pod install
      - name: Generate Flutter iOS files
        run: |
          cd ios
          flutter precache --ios

      # ADD THIS: Explicit pod install with repo update
      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update

      - name: Build IPA
        run: flutter build ipa --no-codesign --release --verbose

      - name: Upload iOS Archive
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-archive
          path: build/ios/archive/Runner.xcarchive

